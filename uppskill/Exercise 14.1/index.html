<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 14.1</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">

        <div class="d-block d-md-none p-3 border mb-3">
            <h3>Mobile View</h3>
            <p>This section is visible only on mobile screens.</p>
        </div>

        <div class="d-none d-md-block d-lg-none p-3 border mb-3">
            <h3>Tablet View</h3>
            <p>This section is visible only on tablet screens.</p>
        </div>

        <div class="d-none d-lg-flex p-3 border">
            <div>
                <h3>Desktop View</h3>
                <p>This section is visible only on large screens.</p>
            </div>
        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
