<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 3px;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h1>Welcome to the Local Community Event Portal</h1>
        <p>
            Hello Resident! 
            <span style="color:red; font-weight:bold;">
                Special Offer: Free Event Registration This Week!
            </span>
        </p>
    </div>

    <h2 class="highlight">Upcoming Community Events</h2>

    <p>
        Don't miss our 
        <span class="highlight">Annual Cultural Festival</span>
        and other exciting activities.
    </p>

</body>
</html>
