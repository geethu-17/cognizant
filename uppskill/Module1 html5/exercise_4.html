<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        .eventImage {
            border: 3px solid #333;
            padding: 5px;
            width: 200px;
            height: 150px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            text-align: center;
            padding: 10px;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <table>
        <caption>Community Events Photo Gallery</caption>

        <tr>
            <td>
                <img src="event1.jpg" alt="Cultural Festival"
                     title="Annual Cultural Festival"
                     class="eventImage">
                <p>Cultural Festival 2025</p>
            </td>

            <td>
                <img src="event2.jpg" alt="Tree Plantation"
                     title="Community Tree Plantation"
                     class="eventImage">
                <p>Tree Plantation Drive</p>
            </td>

            <td>
                <img src="event3.jpg" alt="Sports Meet"
                     title="Community Sports Meet"
                     class="eventImage">
                <p>Sports Meet 2025</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="event4.jpg" alt="Health Camp"
                     title="Free Health Check-up Camp"
                     class="eventImage">
                <p>Health Awareness Camp</p>
            </td>

            <td>
                <img src="event5.jpg" alt="Food Festival"
                     title="Local Food Festival"
                     class="eventImage">
                <p>Food Festival</p>
            </td>

            <td>
                <img src="event6.jpg" alt="Music Program"
                     title="Community Music Night"
                     class="eventImage">
                <p>Music and Cultural Night</p>
            </td>
        </tr>

    </table>

</body>
</html>
