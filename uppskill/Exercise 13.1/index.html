<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13.1</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">

        <h1 class="text-center mb-4">Dashboard</h1>

        <div class="row">

            <div class="col-md-3">
                <div class="bg-primary text-white p-4 rounded text-center">
                    <h3>Users</h3>
                    <h2>150</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-success text-white p-4 rounded text-center">
                    <h3>Sales</h3>
                    <h2>320</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-warning text-dark p-4 rounded text-center">
                    <h3>Orders</h3>
                    <h2>75</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-danger text-white p-4 rounded text-center">
                    <h3>Revenue</h3>
                    <h2>$5000</h2>
                </div>
            </div>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
