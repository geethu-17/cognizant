<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Promo Video</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        .container {
            width: 600px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border: 2px solid #007BFF;
            border-radius: 10px;
        }

        #status {
            color: green;
            font-weight: bold;
        }

        input, textarea {
            width: 90%;
            padding: 8px;
            margin: 10px;
        }
    </style>

    <script>
        // oncanplay event
        function videoReady() {
            document.getElementById("status").innerHTML =
                "Video ready to play!";
        }

        // onbeforeunload event
        window.onbeforeunload = function () {
            return "You have unsaved changes. Are you sure you want to leave?";
        };
    </script>
</head>
<body>

    <div class="container">

        <h2>Community Event Promo Video</h2>

        <video width="500"
               controls
               oncanplay="videoReady()">
            <source src="eventpromo.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <p id="status"></p>

        <h3>Quick Registration Form</h3>

        <input type="text" placeholder="Enter your name">

        <textarea rows="4"
                  placeholder="Enter your comments"></textarea>

    </div>

</body>
</html>
