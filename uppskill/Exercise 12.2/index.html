<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.2</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

    <div class="container py-5">

        <h1 class="text-center mb-5">Pricing Plans</h1>

        <div class="row">

            <div class="col-md-4 mb-4">

                <div class="card p-4 text-center">

                    <h3 class="mb-3">Basic</h3>

                    <h2 class="mb-4">$9/month</h2>

                    <p class="mb-2">1 User</p>
                    <p class="mb-2">10GB Storage</p>
                    <p class="mb-4">Email Support</p>

                    <button class="btn btn-primary">
                        Choose Plan
                    </button>

                </div>

            </div>

            <div class="col-md-4 mb-4">

                <div class="card p-4 text-center">

                    <h3 class="mb-3">Standard</h3>

                    <h2 class="mb-4">$19/month</h2>

                    <p class="mb-2">5 Users</p>
                    <p class="mb-2">50GB Storage</p>
                    <p class="mb-4">Priority Support</p>

                    <button class="btn btn-primary">
                        Choose Plan
                    </button>

                </div>

            </div>

            <div class="col-md-4 mb-4">

                <div class="card p-4 text-center">

                    <h3 class="mb-3">Premium</h3>

                    <h2 class="mb-4">$29/month</h2>

                    <p class="mb-2">Unlimited Users</p>
                    <p class="mb-2">100GB Storage</p>
                    <p class="mb-4">24/7 Support</p>

                    <button class="btn btn-primary">
                        Choose Plan
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
