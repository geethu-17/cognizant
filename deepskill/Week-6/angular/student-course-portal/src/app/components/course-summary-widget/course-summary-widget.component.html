<div class="summary-widget-container glass-card">
  <div class="widget-header">
    <h4 class="widget-title">Academic Registry</h4>
    <span class="pulse-dot"></span>
  </div>
  
  <div class="stat-content">
    <div class="stat-value">{{ coursesCount }}</div>
    <div class="stat-label">Active Catalog Courses</div>
  </div>

  <div class="widget-actions">
    <button class="btn-primary btn-sm btn-widget" (click)="addDemoCourse()" id="btn-add-demo-course">
      <span class="btn-icon">+</span> Add Mock Course
    </button>
  </div>
</div>
